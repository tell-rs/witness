name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  # Releases must not ship untested code: run the full suite before building,
  # since tag pushes don't wait for the CI workflow.
  test:
    name: Test before release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.0
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      - name: Test
        run: cargo nextest run --all --no-fail-fast
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings -A clippy::collapsible_if

  build:
    name: Build ${{ matrix.os_arch }}
    needs: [test]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os_arch: linux-x86_64
            runner: ubuntu-latest
            rust_target: x86_64-unknown-linux-musl
          - os_arch: linux-aarch64
            runner: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-musl

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust target
        run: rustup target add ${{ matrix.rust_target }}

      - name: Install Zig
        uses: mlugg/setup-zig@v2

      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "release-${{ matrix.os_arch }}"

      - name: Build
        run: cargo zigbuild --release --target ${{ matrix.rust_target }}

      # Native-arch runners for both targets — the packaged binary must at
      # least start and print usage before it ships.
      - name: Smoke test binary
        run: |
          BIN=target/${{ matrix.rust_target }}/release/witness
          "$BIN" --help
          "$BIN" setup --help

      - name: Package
        run: |
          ARTIFACT_NAME="witness-${VERSION}-${{ matrix.os_arch }}"
          mkdir -p dist/${ARTIFACT_NAME}
          cp target/${{ matrix.rust_target }}/release/witness dist/${ARTIFACT_NAME}/
          cp LICENSE README.md dist/${ARTIFACT_NAME}/ 2>/dev/null || true
          cd dist
          tar -czf ${ARTIFACT_NAME}.tgz ${ARTIFACT_NAME}
          sha512sum ${ARTIFACT_NAME}.tgz | cut -d' ' -f1 > ${ARTIFACT_NAME}.tgz.sha512
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os_arch }}
          path: dist/witness-${{ env.VERSION }}-${{ matrix.os_arch }}.tgz*

  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create $GITHUB_REF_NAME \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            dist/*
